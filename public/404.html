<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404</title>
    <style>
      @font-face {
        font-family: "nmb";
        src: url("/nmb.woff2");
        font-display: swap;
      }
      @font-face {
        font-family: "nmr";
        src: url("/nmr.woff2");
        font-display: swap;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --vw: calc(100vw / 1920);
      }
      @media (max-width: 768px) {
        :root {
          --vw: calc(100vw / 390);
        }
      }
      html {
        -webkit-font-smoothing: antialiased;
        background: #f2f2f2;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      pre {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      a {
        text-decoration: none;
        color: inherit;
        opacity: 0.5;
        transition: opacity 0.3s;
      }
      a:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <pre>404 Page not found
  <a href="/">← go back home</a>
  </pre>
  </body>
</html>
